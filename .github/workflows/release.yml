name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish (all arches) to GHCR
        uses: home-assistant/builder@2025.11.0
        with:
          args: |
            --all
            --target sense360_zones_addon
            --addon
            --docker-hub ghcr.io/sense360store
